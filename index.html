<!doctype html>
<html lang="en">
<head>

<body>
    <div class="resume-container" id="resume">

            <p id="info-text" contenteditable="true">Mail | Phone</p>
        </section>
        <section class="card interests">
            <h2>Interests</h2>
            <p id="int-text" contenteditable="true">Interests...</p>
